name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8==7.1.1 pytest==8.0.0 httpx fastapi
        # Fixed typo: requirement.txt -> requirements.txt
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Verify pytest is installed natively
        python -m pip list | grep pytest
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Run ML API Tests (Pytest)
      run: |
        # Ensure that the FastAPI mathematics haven't broken
        PYTHONPATH=. python -m pytest tests/
    
    # NEW MLOps CD Step: Ensure Docker containers still build
    - name: Build MLOps Docker Image (API)
      run: |
        docker build -t fin-risk-api -f Dockerfile.api .
        
    - name: Build MLOps Docker Image (Frontend)
      run: |
        docker build -t fin-risk-frontend -f Dockerfile.frontend .
